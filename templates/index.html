<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Bites</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #f7f5f0;
            color: #2b2b2b;
            min-height: 100vh;
            padding: 2.5rem 1.5rem;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 0.25rem;
        }

        h1 span { color: #e85d2f; }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 2rem;
        }

        .search-box {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 2rem;
        }

        .input-wrap {
            flex: 1;
            position: relative;
        }

        .input-wrap span {
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            font-weight: 700;
            color: #aaa;
            font-size: 1rem;
        }

        input[type="number"] {
            width: 100%;
            height: 48px;
            border: 1.5px solid #e0ddd6;
            border-radius: 10px;
            background: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: #1a1a1a;
            padding: 0 0.9rem 0 1.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus { border-color: #e85d2f; }

        button {
            height: 48px;
            padding: 0 1.4rem;
            background: #e85d2f;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover { background: #d44e23; }
        button:active { transform: scale(0.97); }

        .results-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #aaa;
            margin-bottom: 0.75rem;
        }

        .food-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .food-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            border: 1.5px solid #ece9e2;
            border-radius: 12px;
            padding: 0.75rem 1.1rem;
            animation: fadeIn 0.25s ease both;
            transition: border-color 0.2s;
        }

        .food-card:hover { border-color: #e85d2f; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .food-left {
            display: flex;
            align-items: center;
            gap: 0.85rem;
        }

        .food-img {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            background: #f0ede6;
        }

        .food-name {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .food-category {
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 1px;
        }

        .food-price {
            font-weight: 800;
            font-size: 1.05rem;
            color: #e85d2f;
        }

        .empty {
            text-align: center;
            padding: 3rem 0;
            color: #bbb;
        }

        .empty .icon { font-size: 2.2rem; margin-bottom: 0.6rem; }
        .empty p { font-size: 0.9rem; }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #ece9e2;
            border-top-color: #e85d2f;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 3rem auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">

    <h1>Five-Dollar <span>Lunch</span></h1>
    <p class="subtitle">Enter your budget to find what you can eat today.</p>

    <div class="search-box">
        <div class="input-wrap">
            <span>$</span>
            <input type="number" id="budget" placeholder="10.00" min="0" step="0.50" />
        </div>
        <button onclick="search()">Search</button>
    </div>

    <div id="results-label" class="results-label" style="display:none;"></div>
    <div id="results">
        <div class="empty">
            <div class="icon">🍽️</div>
            <p>Enter a budget above to get started.</p>
        </div>
    </div>

</div>

<script>
    const API_BASE = window.location.hostname === 'localhost'
        ? 'http://localhost:5000'
        : `http://${window.location.hostname}:5000`;

    async function search() {
        const budget = parseFloat(document.getElementById('budget').value);
        const label  = document.getElementById('results-label');
        const box    = document.getElementById('results');

        if (!budget || budget <= 0) {
            box.innerHTML = `<div class="empty"><div class="icon">💡</div><p>Enter a dollar amount above.</p></div>`;
            label.style.display = 'none';
            return;
        }

        box.innerHTML = '<div class="spinner"></div>';
        label.style.display = 'none';

        try {
            const res  = await fetch(`${API_BASE}/api/items?budget=${budget}`);
            const data = await res.json();

            label.style.display = 'block';
            label.textContent = `${data.count} result${data.count !== 1 ? 's' : ''} under $${budget.toFixed(2)}`;

            if (data.items.length === 0) {
                box.innerHTML = `<div class="empty"><div class="icon">💸</div><p>Nothing found. Try a higher budget.</p></div>`;
                return;
            }

            const list = document.createElement('div');
            list.className = 'food-list';
            box.innerHTML = '';

            data.items.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'food-card';
                card.style.animationDelay = `${i * 0.04}s`;
                card.innerHTML = `
                    <div class="food-left">
                        <img class="food-img"
                             src="${item.image_url}"
                             alt="${item.name}"

                             onerror="this.src='https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=100'" />
                        <div>
                            <div class="food-name">${item.name}</div>
                            <div class="food-category">${item.category}</div>
                        </div>
                    </div>
                    <div class="food-price">$${item.price.toFixed(2)}</div>`;
                list.appendChild(card);
            });

            box.appendChild(list);

        } catch {
            box.innerHTML = `<div class="empty"><div class="icon">⚠️</div><p>Could not connect to the server.</p></div>`;
        }
    }

    document.getElementById('budget').addEventListener('keydown', e => {
        if (e.key === 'Enter') search();
    });
</script>
</body>
</html>
